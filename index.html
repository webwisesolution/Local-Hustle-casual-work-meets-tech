<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Local Hustle · casual work meets tech</title>
  <!-- Tailwind + Font Awesome + Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #fef9e8; }
    .rating-star { cursor: pointer; transition: 0.1s; }
    .rating-star:hover { transform: scale(1.1); }
    .modal-transition { transition: opacity 0.2s ease, visibility 0.2s; }
    .job-card {
      transition: transform 0.15s ease, box-shadow 0.2s;
    }
    .job-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 25px -12px rgba(0,0,0,0.1);
    }
    /* custom scroll */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
  </style>
</head>
<body class="antialiased">

  <!-- main container -->
  <div class="max-w-7xl mx-auto px-4 py-6 md:py-8">
    
    <!-- header area -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
      <div>
        <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-orange-700 to-amber-600 bg-clip-text text-transparent">
          <i class="fas fa-hard-hat text-orange-600 mr-2"></i>Local Hustle
        </h1>
        <p class="text-gray-600 mt-1 text-sm md:text-base">mjengo · gigs · errands — find & post casual work near you</p>
      </div>
      <div class="flex gap-3">
        <button id="refreshLocationBtn" class="bg-white border border-orange-300 text-orange-700 px-4 py-2 rounded-xl shadow-sm text-sm font-semibold hover:bg-orange-50 transition flex items-center gap-2">
          <i class="fas fa-location-dot"></i> <span id="locStatus">My location</span>
        </button>
        <button id="openPostModalBtn" class="bg-orange-600 hover:bg-orange-700 text-white px-5 py-2 rounded-xl shadow-md font-bold text-sm flex items-center gap-2 transition">
          <i class="fas fa-plus-circle"></i> Post a hustle
        </button>
      </div>
    </div>

    <!-- filters row: category + distance toggle hint -->
    <div class="flex flex-wrap justify-between items-center gap-3 mb-6">
      <div class="flex flex-wrap gap-2">
        <button data-cat="all" class="cat-filter px-4 py-1.5 rounded-full text-sm font-medium bg-orange-600 text-white shadow-sm">All</button>
        <button data-cat="mjengo" class="cat-filter px-4 py-1.5 rounded-full text-sm font-medium bg-gray-100 text-gray-800 hover:bg-orange-100">🧱 Mjengo</button>
        <button data-cat="gigs" class="cat-filter px-4 py-1.5 rounded-full text-sm font-medium bg-gray-100 text-gray-800 hover:bg-orange-100">🎤 Gigs</button>
        <button data-cat="errands" class="cat-filter px-4 py-1.5 rounded-full text-sm font-medium bg-gray-100 text-gray-800 hover:bg-orange-100">🛵 Errands</button>
      </div>
      <div class="text-xs text-gray-500 bg-white/60 px-3 py-1 rounded-full">
        <i class="fas fa-map-marker-alt text-orange-500 mr-1"></i> 
        <span id="distanceHint">📍 location-based matching · nearest first</span>
      </div>
    </div>

    <!-- job grid -->
    <div id="jobsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- dynamic cards injected here -->
      <div class="col-span-full text-center py-12 text-gray-400">loading hustles...</div>
    </div>
  </div>

  <!-- ========== MODAL: POST A JOB ========== -->
  <div id="postModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 opacity-0 invisible transition-all duration-200 px-4">
    <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl transform transition-all">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-bullhorn text-orange-500 mr-2"></i>Post a small job</h2>
        <button id="closePostModalBtn" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
      </div>
      <form id="postJobForm">
        <div class="mb-3">
          <label class="block text-sm font-semibold mb-1">Job title *</label>
          <input type="text" id="jobTitle" required class="w-full border border-gray-300 rounded-xl px-4 py-2 focus:ring-orange-400 focus:border-orange-400">
        </div>
        <div class="mb-3">
          <label class="block text-sm font-semibold mb-1">Description *</label>
          <textarea id="jobDesc" rows="2" required class="w-full border border-gray-300 rounded-xl px-4 py-2"></textarea>
        </div>
        <div class="mb-3">
          <label class="block text-sm font-semibold mb-1">Category *</label>
          <select id="jobCat" class="w-full border border-gray-300 rounded-xl px-4 py-2">
            <option value="mjengo">🧱 Mjengo (construction/labor)</option>
            <option value="gigs">🎤 Gig / event</option>
            <option value="errands">🛵 Errand / delivery</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="block text-sm font-semibold mb-1">Location (area) *</label>
          <select id="jobLocationSelect" class="w-full border border-gray-300 rounded-xl px-4 py-2">
            <option value="Kilimani">Kilimani</option><option value="Westlands">Westlands</option><option value="CBD">CBD</option>
            <option value="Eastlands">Eastlands</option><option value="Langata">Langata</option><option value="Kasarani">Kasarani</option>
          </select>
          <p class="text-xs text-gray-400 mt-1">📍 Jobs matched based on distance from you</p>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-1">WhatsApp / Call number *</label>
          <input type="tel" id="jobPhone" placeholder="+2547XXXXXXXX" required class="w-full border border-gray-300 rounded-xl px-4 py-2">
        </div>
        <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-2.5 rounded-xl transition">➕ Publish hustle</button>
      </form>
    </div>
  </div>

  <!-- ========== MODAL: REVIEWS + ADD REVIEW ========== -->
  <div id="reviewModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 opacity-0 invisible transition-all duration-200 px-4">
    <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl max-h-[85vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-3">
        <h3 class="text-xl font-bold" id="reviewModalTitle">Reviews</h3>
        <button id="closeReviewModalBtn" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
      </div>
      <div id="reviewsListContainer" class="space-y-3 max-h-64 overflow-y-auto mb-4 pr-1">
        <!-- dynamic reviews list -->
      </div>
      <div class="border-t pt-4 mt-2">
        <p class="font-semibold text-gray-700 mb-2">⭐ Rate this gig</p>
        <div class="flex gap-1 mb-3" id="ratingStarsContainer">
          <!-- stars 1-5 dynamic -->
        </div>
        <textarea id="reviewComment" rows="2" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm" placeholder="Share your experience..."></textarea>
        <button id="submitReviewBtn" class="mt-3 w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold py-2 rounded-xl transition">Submit review</button>
      </div>
    </div>
  </div>

  <script>
    // ----------------------------------------------
    //  DATA MODELS & MOCK INITIAL DATA
    // ----------------------------------------------
    const LOCATION_COORDS = {
      "Kilimani": { lat: -1.2921, lng: 36.8219 },
      "Westlands": { lat: -1.2675, lng: 36.8029 },
      "CBD": { lat: -1.2864, lng: 36.8172 },
      "Eastlands": { lat: -1.2833, lng: 36.8333 },
      "Langata": { lat: -1.3333, lng: 36.7167 },
      "Kasarani": { lat: -1.2297, lng: 36.8967 }
    };

    let jobs = [];          // { id, title, desc, category, locationName, lat, lng, contactPhone, posterName? }
    let reviews = [];       // { id, jobId, rating, comment, userName, date }
    let currentUserLocation = null;   // { lat, lng }
    let activeCategory = "all";
    let currentJobForReview = null;    // job object for review modal
    let selectedRating = 0;

    // helpers
    function saveToLocal() {
      localStorage.setItem("localHustle_jobs", JSON.stringify(jobs));
      localStorage.setItem("localHustle_reviews", JSON.stringify(reviews));
    }

    function loadFromLocal() {
      const storedJobs = localStorage.getItem("localHustle_jobs");
      const storedReviews = localStorage.getItem("localHustle_reviews");
      if (storedJobs) jobs = JSON.parse(storedJobs);
      if (storedReviews) reviews = JSON.parse(storedReviews);
      if (!storedJobs) initMockData();
    }

    function initMockData() {
      jobs = [
        { id: 101, title: "Mjengo: Carry bricks & mix cement", description: "Need 2 strong people tomorrow 7am. 800 KES/day", category: "mjengo", locationName: "Kilimani", lat: -1.2921, lng: 36.8219, contactPhone: "+254712345678", poster: "James" },
        { id: 102, title: "Errand: Pick up package & deliver", description: "Pick parcel from posta CBD to Westlands. 500 KES", category: "errands", locationName: "Westlands", lat: -1.2675, lng: 36.8029, contactPhone: "+254722111222", poster: "Mary" },
        { id: 103, title: "Gig: Event setup crew (chairs & tents)", description: "Saturday event, 9am-2pm, 1200 KES + lunch", category: "gigs", locationName: "CBD", lat: -1.2864, lng: 36.8172, contactPhone: "+254733444555", poster: "Events Ltd" },
        { id: 104, title: "Mzigo: Help moving furniture", description: "Moving 3-seater sofa & boxes. 2hrs work, 700 KES", category: "errands", locationName: "Langata", lat: -1.3333, lng: 36.7167, contactPhone: "+254711223344", poster: "Brian" },
        { id: 105, title: "Painting job (mjengo)", description: "Paint exterior wall, brushes provided. 1500 KES", category: "mjengo", locationName: "Kasarani", lat: -1.2297, lng: 36.8967, contactPhone: "+254700987654", poster: "Lucy" }
      ];
      reviews = [
        { id: 1001, jobId: 101, rating: 5, comment: "Fair pay, good communication.", userName: "John K.", date: "2025-02-10" },
        { id: 1002, jobId: 101, rating: 4, comment: "Heavy work but got paid on time", userName: "Peter", date: "2025-02-12" },
        { id: 1003, jobId: 102, rating: 5, comment: "Super fast errand, tipped extra", userName: "Alice", date: "2025-02-09" },
        { id: 1004, jobId: 103, rating: 4, comment: "Organized crew, would work again", userName: "Mike", date: "2025-02-08" },
        { id: 1005, jobId: 105, rating: 3, comment: "Tiring but okay", userName: "Esther", date: "2025-02-07" }
      ];
      saveToLocal();
    }

    // haversine distance (km)
    function getDistanceFromUser(lat, lng) {
      if (!currentUserLocation) return null;
      const R = 6371;
      const dLat = (lat - currentUserLocation.lat) * Math.PI / 180;
      const dLng = (lng - currentUserLocation.lng) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(currentUserLocation.lat * Math.PI/180) * Math.cos(lat * Math.PI/180) *
                Math.sin(dLng/2) * Math.sin(dLng/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return (R * c).toFixed(1);
    }

    // compute avg rating + count for job
    function getJobRatingStats(jobId) {
      const jobReviews = reviews.filter(r => r.jobId === jobId);
      const count = jobReviews.length;
      if (count === 0) return { avg: 0, total: 0 };
      const sum = jobReviews.reduce((acc, r) => acc + r.rating, 0);
      return { avg: (sum / count).toFixed(1), total: count };
    }

    // render star HTML from avg
    function renderStars(avgRating) {
      const full = Math.floor(avgRating);
      const half = (avgRating - full) >= 0.5 ? 1 : 0;
      let starsHtml = '';
      for (let i=1; i<=5; i++) {
        if (i <= full) starsHtml += '<i class="fas fa-star text-amber-400 text-xs"></i>';
        else if (i === full+1 && half) starsHtml += '<i class="fas fa-star-half-alt text-amber-400 text-xs"></i>';
        else starsHtml += '<i class="far fa-star text-amber-300 text-xs"></i>';
      }
      return starsHtml;
    }

    // create job card
    function renderJobCard(job, distance) {
      const { avg, total } = getJobRatingStats(job.id);
      const avgNum = parseFloat(avg);
      const distanceText = distance !== null ? `${distance} km away` : '📍 distance unknown';
      const distanceIcon = distance !== null ? (distance <= 5 ? '<i class="fas fa-walking text-green-600"></i>' : '<i class="fas fa-car text-orange-500"></i>') : '<i class="fas fa-map-marker-alt"></i>';
      
      return `
        <div class="job-card bg-white rounded-2xl shadow-md border border-orange-100 overflow-hidden flex flex-col h-full">
          <div class="p-5 flex-1">
            <div class="flex justify-between items-start">
              <span class="text-xs font-bold px-2 py-1 rounded-full bg-orange-100 text-orange-700 uppercase">${job.category}</span>
              <span class="text-xs text-gray-400"><i class="far fa-clock"></i> posted recently</span>
            </div>
            <h3 class="font-extrabold text-lg mt-2 text-gray-800">${escapeHtml(job.title)}</h3>
            <p class="text-gray-600 text-sm mt-1 line-clamp-2">${escapeHtml(job.description)}</p>
            <div class="flex items-center gap-1 mt-3 text-sm text-gray-500">
              <i class="fas fa-location-dot text-orange-500"></i> <span>${job.locationName}</span>
              <span class="mx-1">•</span>
              <span class="text-xs font-medium ${distance !== null ? 'text-orange-600' : 'text-gray-400'}">${distanceIcon} ${distanceText}</span>
            </div>
            <!-- rating area -->
            <div class="flex items-center gap-2 mt-3">
              <div class="flex">${renderStars(avgNum)}</div>
              <span class="text-xs font-semibold text-gray-700">${avgNum > 0 ? avgNum : 'new'}</span>
              <span class="text-xs text-gray-400">(${total} review${total !== 1 ? 's' : ''})</span>
              <button data-jobid="${job.id}" class="viewReviewsBtn ml-auto text-xs text-orange-600 font-medium hover:underline">📝 reviews</button>
            </div>
          </div>
          <div class="border-t border-gray-100 px-5 py-3 flex gap-2 bg-gray-50">
            <a href="tel:${job.contactPhone}" class="flex-1 text-center bg-green-600 hover:bg-green-700 text-white text-sm font-semibold py-2 rounded-xl transition flex items-center justify-center gap-1"><i class="fas fa-phone-alt"></i> Call</a>
            <a href="https://wa.me/${job.contactPhone.replace(/[^0-9]/g, '')}" target="_blank" class="flex-1 text-center bg-teal-600 hover:bg-teal-700 text-white text-sm font-semibold py-2 rounded-xl transition flex items-center justify-center gap-1"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <button data-jobid="${job.id}" class="rateQuickBtn flex-1 text-center bg-amber-100 hover:bg-amber-200 text-amber-800 text-sm font-medium py-2 rounded-xl transition flex items-center justify-center gap-1"><i class="fas fa-star"></i> Rate</button>
          </div>
        </div>
      `;
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // main render with category filter + distance sort
    function renderAllJobs() {
      let filtered = jobs.filter(job => activeCategory === "all" || job.category === activeCategory);
      // add distance and sort if location exists
      const jobsWithDistance = filtered.map(job => {
        let dist = null;
        if (currentUserLocation) {
          dist = getDistanceFromUser(job.lat, job.lng);
          dist = dist ? parseFloat(dist) : null;
        }
        return { ...job, distance: dist };
      });
      if (currentUserLocation) {
        jobsWithDistance.sort((a,b) => {
          if (a.distance === null && b.distance === null) return 0;
          if (a.distance === null) return 1;
          if (b.distance === null) return -1;
          return a.distance - b.distance;
        });
      } else {
        jobsWithDistance.sort((a,b) => b.id - a.id);
      }
      const container = document.getElementById("jobsContainer");
      if (!jobsWithDistance.length) {
        container.innerHTML = `<div class="col-span-full text-center py-12 text-gray-400 bg-white/40 rounded-2xl"><i class="fas fa-tools text-3xl mb-2"></i><p>No hustles found. Be the first to <button id="emptyPostBtn" class="text-orange-600 underline font-semibold">post a job</button>!</p></div>`;
        const emptyBtn = document.getElementById("emptyPostBtn");
        if (emptyBtn) emptyBtn.onclick = () => openPostModal();
        return;
      }
      let html = '';
      jobsWithDistance.forEach(job => {
        html += renderJobCard(job, job.distance !== undefined ? job.distance : null);
      });
      container.innerHTML = html;
      // attach review buttons & rate buttons dynamically
      document.querySelectorAll('.viewReviewsBtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const jobId = parseInt(btn.getAttribute('data-jobid'));
          const job = jobs.find(j => j.id === jobId);
          if (job) openReviewModal(job);
        });
      });
      document.querySelectorAll('.rateQuickBtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const jobId = parseInt(btn.getAttribute('data-jobid'));
          const job = jobs.find(j => j.id === jobId);
          if (job) openReviewModal(job);
        });
      });
    }

    // ----- POST JOB ------
    function openPostModal() {
      document.getElementById("postModal").classList.remove("opacity-0", "invisible");
      document.getElementById("postModal").classList.add("opacity-100", "visible");
    }
    function closePostModal() {
      document.getElementById("postModal").classList.add("opacity-0", "invisible");
      document.getElementById("postModal").classList.remove("opacity-100", "visible");
    }
    function handlePostJob(e) {
      e.preventDefault();
      const title = document.getElementById("jobTitle").value.trim();
      const desc = document.getElementById("jobDesc").value.trim();
      const category = document.getElementById("jobCat").value;
      const locationName = document.getElementById("jobLocationSelect").value;
      const phone = document.getElementById("jobPhone").value.trim();
      if (!title || !desc || !phone) { alert("Please fill all fields"); return; }
      const coords = LOCATION_COORDS[locationName];
      if (!coords) { alert("Invalid location"); return; }
      const newJob = {
        id: Date.now(),
        title: title,
        description: desc,
        category: category,
        locationName: locationName,
        lat: coords.lat,
        lng: coords.lng,
        contactPhone: phone,
        poster: "User"
      };
      jobs.unshift(newJob);
      saveToLocal();
      closePostModal();
      document.getElementById("postJobForm").reset();
      renderAllJobs();
    }

    // ------ REVIEW MODAL LOGIC -------
    function openReviewModal(job) {
      currentJobForReview = job;
      document.getElementById("reviewModalTitle").innerHTML = `<i class="fas fa-star text-amber-400"></i> ${escapeHtml(job.title)} · reviews`;
      // render existing reviews
      const jobReviews = reviews.filter(r => r.jobId === job.id);
      const container = document.getElementById("reviewsListContainer");
      if (jobReviews.length === 0) {
        container.innerHTML = `<div class="text-gray-400 text-sm italic p-2">No reviews yet. Be the first to rate this hustle!</div>`;
      } else {
        container.innerHTML = jobReviews.map(rev => `
          <div class="border-b border-gray-100 pb-2">
            <div class="flex justify-between text-xs text-gray-500"><span class="font-semibold">${escapeHtml(rev.userName || "Worker")}</span><span>${rev.date || "recent"}</span></div>
            <div class="flex text-amber-400 text-xs my-1">${renderStars(rev.rating)}</div>
            <p class="text-sm text-gray-700">${escapeHtml(rev.comment)}</p>
          </div>
        `).join('');
      }
      // rating stars selector
      const starContainer = document.getElementById("ratingStarsContainer");
      starContainer.innerHTML = '';
      selectedRating = 0;
      for (let i=1; i<=5; i++) {
        const star = document.createElement('i');
        star.className = `far fa-star text-2xl text-amber-400 rating-star mr-1 transition`;
        star.dataset.rating = i;
        star.addEventListener('click', () => {
          selectedRating = i;
          updateStarSelection(starContainer, i);
        });
        starContainer.appendChild(star);
      }
      document.getElementById("reviewComment").value = '';
      // show modal
      document.getElementById("reviewModal").classList.remove("opacity-0", "invisible");
      document.getElementById("reviewModal").classList.add("opacity-100", "visible");
    }
    function updateStarSelection(container, ratingVal) {
      const stars = container.querySelectorAll('.rating-star');
      stars.forEach((star, idx) => {
        if (idx < ratingVal) {
          star.className = "fas fa-star text-2xl text-amber-400 rating-star mr-1";
        } else {
          star.className = "far fa-star text-2xl text-amber-400 rating-star mr-1";
        }
      });
    }
    function closeReviewModal() {
      document.getElementById("reviewModal").classList.add("opacity-0", "invisible");
      document.getElementById("reviewModal").classList.remove("opacity-100", "visible");
      currentJobForReview = null;
    }
    function submitReview() {
      if (!currentJobForReview) return;
      if (selectedRating === 0) { alert("Please select a star rating (1-5)"); return; }
      const comment = document.getElementById("reviewComment").value.trim();
      if (!comment) { alert("Please write a short review"); return; }
      const newReview = {
        id: Date.now(),
        jobId: currentJobForReview.id,
        rating: selectedRating,
        comment: comment,
        userName: "Local Hustler",
        date: new Date().toISOString().slice(0,10)
      };
      reviews.push(newReview);
      saveToLocal();
      closeReviewModal();
      renderAllJobs();   // refresh avg stars
    }

    // ----- GEOLOCATION + UPDATE UI -------
    function requestLocationAndRefresh() {
      const statusSpan = document.getElementById("locStatus");
      if (navigator.geolocation) {
        statusSpan.innerHTML = '<i class="fas fa-spinner fa-spin"></i> locating...';
        navigator.geolocation.getCurrentPosition(
          (position) => {
            currentUserLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
            statusSpan.innerHTML = '<i class="fas fa-check-circle"></i> near me';
            document.getElementById("distanceHint").innerHTML = '📍 jobs sorted by distance · nearest first';
            renderAllJobs();
          },
          (err) => {
            console.warn(err);
            currentUserLocation = null;
            statusSpan.innerHTML = '<i class="fas fa-map-marker-alt"></i> location off';
            document.getElementById("distanceHint").innerHTML = '⚠️ enable location for distance matching';
            renderAllJobs();
          }
        );
      } else {
        currentUserLocation = null;
        statusSpan.innerHTML = 'no GPS';
        renderAllJobs();
      }
    }

    // filter category event
    function initFilters() {
      document.querySelectorAll('.cat-filter').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.cat-filter').forEach(b => {
            b.classList.remove('bg-orange-600', 'text-white');
            b.classList.add('bg-gray-100', 'text-gray-800');
          });
          btn.classList.remove('bg-gray-100', 'text-gray-800');
          btn.classList.add('bg-orange-600', 'text-white');
          activeCategory = btn.getAttribute('data-cat');
          renderAllJobs();
        });
      });
    }

    // set up all
    window.addEventListener('DOMContentLoaded', () => {
      loadFromLocal();
      initFilters();
      requestLocationAndRefresh();
      document.getElementById("openPostModalBtn").addEventListener("click", openPostModal);
      document.getElementById("closePostModalBtn").addEventListener("click", closePostModal);
      document.getElementById("postModal").addEventListener("click", (e) => { if(e.target === document.getElementById("postModal")) closePostModal(); });
      document.getElementById("postJobForm").addEventListener("submit", handlePostJob);
      document.getElementById("refreshLocationBtn").addEventListener("click", () => requestLocationAndRefresh());
      // review modal close
      document.getElementById("closeReviewModalBtn").addEventListener("click", closeReviewModal);
      document.getElementById("reviewModal").addEventListener("click", (e) => { if(e.target === document.getElementById("reviewModal")) closeReviewModal(); });
      document.getElementById("submitReviewBtn").addEventListener("click", submitReview);
      renderAllJobs();
    });
  </script>
</body>
</html>
